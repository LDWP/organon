# Généré depuis selecteurs/portails.lst par scripts/migrate_selectors.py.
# Ne pas éditer à la main sans mettre à jour le fichier source ci-dessus, ou
# créer un portails.local.yaml pour des règles spécifiques (voir README).

- when:
    field: rangs.embranchement
    eq: Annelida
