# Inventaire de toutes les bases de données biologiques considérées pour Organon, intégrées ou
# non. Transcription structurée de db-inventory.md (hors dépôt, voir ce fichier pour le détail
# des sondages) — sert de source pour GET /api/v1/sources (voir organon/core/db_inventory.py).
#
# Chaque source :
#   - statut : disponible | non_sonde | bloque | bloque_temporaire | mort | contact_requis |
#     ecarte | hors_perimetre | retire. Pour les sources "disponible", ce champ est de toute
#     façon recalculé depuis le registre de modules à la lecture (voir build_sources_overview) :
#     un module réellement enregistré est toujours affiché disponible même si cette valeur figée
#     dit encore autre chose (cas de tropicos ci-dessous, intégré après cet inventaire). "retire"
#     est réservé à une source qui a eu un module fonctionnel puis débranché volontairement (voir
#     otl ci-dessous) — à ne pas confondre avec "ecarte", jamais intégrée.
#   - classification.estime : false si vérifié dans du code (module Python d'Organon ou
#     déclaration `declare_module()` de l'ancien PHP), true si c'est une supposition sur la
#     nature de la base, jamais portée.
#   - elements_recoltes : uniquement renseigné pour les sources disponibles (rien n'est
#     collecté pour une base non intégrée).
#   - acces.type : api_rest | soap | scraping | verification_http | export | contact_requis |
#     bloque | mort | inconnu.

