# Données grammaticales par rang taxonomique, réduites aux primitives non dérivables :
# genre (masculin/féminin), rang_inferieur_espece (voir wp_est_italique), et deux
# irrégularités explicites quand elles s'écartent des règles par défaut :
#   - page : titre de la page wiki cible, uniquement si différent du nom capitalisé
#     (lien auto-généré vers [[Nom]] / [[nom]] sinon) ;
#   - pluriel : forme irrégulière, uniquement si différente de nom + 's' ;
#   - invariant : rang pseudo-taxonomique (non-classé) sans majuscule/lien/pluriel réels.
# Tout le reste (majuscule, wikiliens, articles un/une/le/la/l', accord de l'adjectif
# « éteint ») est calculé par organon/core/rendering/grammar.py à partir de ces primitives
# plutôt que dupliqué ici. Voir aussi scripts/build_ranks_yaml.py pour la génération de ce
# fichier.
#
# Quelques corrections volontaires par rapport aux données sources (bugs de transcription
# corrigés par le calcul plutôt que reproduits) : sous-tribu (majuscule/minuscule du pluriel
# étaient inversées), phylum/kingdom (pluriel majuscule non capitalisé), type (article défini
# vide au lieu de « le »), infra-tribu (article défini « la » au lieu de « l' », le nom
# commençant par une voyelle).

